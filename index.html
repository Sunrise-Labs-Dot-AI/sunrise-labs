<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sunrise Labs</title>
  <meta name="description" content="Sunrise Labs">
  <meta property="og:title" content="Sunrise Labs">
  <meta property="og:description" content="Sunrise Labs">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sunriselabs.ai">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #0a0a0f;
    }

    /* Scrollable layer: tall enough to give scroll room for scrubbing */
    .scroll-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow-y: scroll;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      z-index: 1;
    }

    .scroll-spacer {
      /* 6x viewport height gives generous scrub range */
      height: 600vh;
      pointer-events: none;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      background: #0a0a0f;
    }

    .video-bg video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .wordmark {
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
      text-shadow: 0 0 80px rgba(255, 140, 50, 0.3);
      animation: fadeIn 3s ease-out forwards;
      opacity: 0;
    }

    .mail-icon {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: auto;
    }

    .mail-icon a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
      text-decoration: none;
      animation: fadeIn 4s ease-out forwards;
      opacity: 0;
    }

    .mail-icon a:hover {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.12);
    }

    .mail-icon a svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: rgba(255, 255, 255, 0.7);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Subtle scroll hint that fades out */
    .scroll-hint {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      animation: hintAppear 6s ease-out forwards;
    }

    .scroll-hint span {
      display: block;
      width: 1px;
      height: 20px;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.2), rgba(255,255,255,0));
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes hintAppear {
      0%, 60% { opacity: 0; }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes scrollPulse {
      0%, 100% { transform: translateY(-4px); opacity: 0.3; }
      50% { transform: translateY(4px); opacity: 0.7; }
    }

    /* Hide scrollbar but keep scrollable */
    .scroll-container::-webkit-scrollbar { display: none; }
    .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div class="video-bg">
    <video id="vid" muted playsinline preload="auto" poster="">
      <source src="sunrise.mp4" type="video/mp4">
    </video>
  </div>

  <div class="content">
    <div class="wordmark">Sunrise Labs</div>
  </div>

  <div class="mail-icon">
    <a href="mailto:hello@sunriselabs.com" aria-label="Email us">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="2,4 12,13 22,4"/>
      </svg>
    </a>
  </div>

  <div class="scroll-hint"><span></span></div>

  <!-- Scroll container for scrub interaction -->
  <div class="scroll-container" id="scroller">
    <div class="scroll-spacer"></div>
  </div>

  <script>
    const video = document.getElementById('vid');
    const scroller = document.getElementById('scroller');
    let duration = 0;
    let isScrollScrubbing = false;
    let autoPlayRAF = null;
    let autoPlayRate = 0.08; // slow auto-advance: ~8s video over ~100s
    let lastScrollTime = 0;
    let scrollTimeout = null;

    // Wait for video metadata
    video.addEventListener('loadedmetadata', () => {
      duration = video.duration;
      // Start at beginning
      video.currentTime = 0;
      // Begin slow auto-play
      startAutoPlay();
    });

    // Slow auto-advance: creep through the sunrise
    function startAutoPlay() {
      if (autoPlayRAF) return;
      let lastTime = performance.now();

      function tick(now) {
        if (!isScrollScrubbing && duration > 0) {
          const dt = (now - lastTime) / 1000;
          const newTime = video.currentTime + dt * autoPlayRate;
          // Loop back to start if we reach the end
          video.currentTime = newTime >= duration ? 0 : newTime;
        }
        lastTime = now;
        autoPlayRAF = requestAnimationFrame(tick);
      }

      autoPlayRAF = requestAnimationFrame(tick);
    }

    // Scroll-scrub: map scroll position to video time
    scroller.addEventListener('scroll', () => {
      if (duration <= 0) return;

      isScrollScrubbing = true;
      lastScrollTime = Date.now();

      const scrollTop = scroller.scrollTop;
      const maxScroll = scroller.scrollHeight - scroller.clientHeight;
      const progress = Math.min(Math.max(scrollTop / maxScroll, 0), 1);

      video.currentTime = progress * duration;

      // Resume auto-play after 2s of no scrolling
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        isScrollScrubbing = false;
      }, 2000);
    }, { passive: true });

    // Touch handling: ensure smooth scrub on mobile
    let touchStartY = 0;
    let touchStartScroll = 0;

    scroller.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
      touchStartScroll = scroller.scrollTop;
    }, { passive: true });

    // Prevent bounce/overscroll on iOS
    document.body.addEventListener('touchmove', (e) => {
      // Allow scrolling within our container
    }, { passive: true });

    // Fallback: if video doesn't load metadata quickly, try playing
    setTimeout(() => {
      if (duration === 0) {
        video.play().catch(() => {});
      }
    }, 1000);
  </script>
</body>
</html>
