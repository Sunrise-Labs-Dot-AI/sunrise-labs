<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunrise Labs</title>
  <meta name="description" content="Sunrise Labs">
  <meta property="og:title" content="Sunrise Labs">
  <meta property="og:description" content="Sunrise Labs">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sunriselabs.ai">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9728;</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      background: #0a0a0f;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .wordmark {
      font-size: clamp(1.6rem, 3.5vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
      text-shadow: 0 0 80px rgba(255, 140, 50, 0.3);
      animation: fadeIn 3s ease-out forwards;
      opacity: 0;
    }

    .mail-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 20;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.4s ease;
      animation: fadeIn 4s ease-out 1.5s forwards;
      opacity: 0;
    }

    .mail-btn:hover {
      border-color: rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
    }

    .mail-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: rgba(255, 255, 255, 0.45);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.4s ease;
    }

    .mail-btn:hover svg {
      stroke: rgba(255, 255, 255, 0.75);
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="content">
    <div class="wordmark">Sunrise Labs</div>
  </div>
  <a href="mailto:hello@sunriselabs.com" class="mail-btn" aria-label="Get in touch">
    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
  </a>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      w = canvas.width = window.innerWidth * dpr;
      h = canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }

    window.addEventListener('resize', resize);
    resize();

    function draw() {
      time += 0.003;

      const horizonY = h * 0.62;

      const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
      skyGrad.addColorStop(0, '#05050f');
      skyGrad.addColorStop(0.25, '#0a0a1e');
      skyGrad.addColorStop(0.45, '#1a0a2e');
      skyGrad.addColorStop(0.55, '#3d1233');
      skyGrad.addColorStop(0.62, '#8b2a1a');
      skyGrad.addColorStop(0.68, '#d4622a');
      skyGrad.addColorStop(0.73, '#e8943a');
      skyGrad.addColorStop(0.78, '#f0c040');
      skyGrad.addColorStop(0.85, '#e8943a');
      skyGrad.addColorStop(1.0, '#1a0a0a');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, w, h);

      const sunX = w * 0.5;
      const sunY = horizonY + Math.sin(time * 0.5) * h * 0.01;
      const sunR = w * 0.35;

      const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
      sunGlow.addColorStop(0, 'rgba(255, 220, 120, 0.9)');
      sunGlow.addColorStop(0.08, 'rgba(255, 180, 60, 0.7)');
      sunGlow.addColorStop(0.2, 'rgba(255, 120, 40, 0.4)');
      sunGlow.addColorStop(0.5, 'rgba(200, 60, 30, 0.15)');
      sunGlow.addColorStop(1, 'rgba(100, 20, 10, 0)');
      ctx.fillStyle = sunGlow;
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < 5; i++) {
        const bandY = horizonY - h * 0.02 + i * h * 0.015;
        const bandAlpha = 0.06 - i * 0.01;
        const offset = Math.sin(time + i * 0.7) * w * 0.02;
        ctx.fillStyle = `rgba(255, ${160 + i * 15}, ${60 + i * 20}, ${bandAlpha})`;
        ctx.fillRect(0, bandY + offset, w, h * 0.008);
      }

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + time * 0.2;
        const len = w * (0.15 + Math.sin(time * 2 + i) * 0.05);
        const streakAlpha = 0.03 + Math.sin(time * 1.5 + i * 0.8) * 0.02;

        ctx.beginPath();
        ctx.moveTo(sunX, sunY);
        ctx.lineTo(
          sunX + Math.cos(angle) * len,
          sunY + Math.sin(angle) * len * 0.15
        );
        ctx.strokeStyle = `rgba(255, 200, 100, ${streakAlpha})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 40; i++) {
        const seed = i * 127.1;
        const px = ((Math.sin(seed) * 43758.5453) % 1 + 1) % 1 * w;
        const py = ((Math.sin(seed * 1.3) * 23421.631) % 1 + 1) % 1 * h * 0.8 + h * 0.1;
        const drift = Math.sin(time * 0.5 + seed) * 20;
        const rise = Math.cos(time * 0.3 + seed * 0.7) * 10;
        const size = 1 + ((Math.sin(seed * 2.1) + 1) * 0.5) * 2;
        const alpha = 0.1 + Math.sin(time + seed) * 0.08;

        ctx.beginPath();
        ctx.arc(px + drift, py + rise, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, ${180 + Math.floor(Math.sin(seed) * 40)}, ${100 + Math.floor(Math.sin(seed * 1.5) * 60)}, ${alpha})`;
        ctx.fill();
      }
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = 'overlay';
      for (let y = 0; y < h; y += 4) {
        ctx.fillStyle = `rgba(0, 0, 0, 0.03)`;
        ctx.fillRect(0, y, w, 1);
      }
      ctx.restore();

      const vigGrad = ctx.createRadialGradient(w / 2, h / 2, w * 0.2, w / 2, h / 2, w * 0.75);
      vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
      vigGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
      ctx.fillStyle = vigGrad;
      ctx.fillRect(0, 0, w, h);

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
