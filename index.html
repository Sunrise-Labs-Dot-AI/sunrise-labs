<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sunrise Labs</title>
  <meta name="description" content="Sunrise Labs">
  <meta property="og:title" content="Sunrise Labs">
  <meta property="og:description" content="Sunrise Labs">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sunriselabs.ai">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #0a0a0f;
    }

    .scroll-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow-y: scroll;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      z-index: 1;
    }

    .scroll-spacer {
      height: 600vh;
      pointer-events: none;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      background: #0a0a0f;
    }

    .video-bg video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .wordmark {
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
      text-shadow: 0 0 80px rgba(255, 140, 50, 0.3);
      animation: fadeIn 3s ease-out forwards;
      opacity: 0;
    }

    .mail-icon {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: auto;
    }

    .mail-icon a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
      text-decoration: none;
      animation: fadeIn 4s ease-out forwards;
      opacity: 0;
    }

    .mail-icon a:hover {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.12);
    }

    .mail-icon a svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: rgba(255, 255, 255, 0.7);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .scroll-hint {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      animation: hintAppear 6s ease-out forwards;
    }

    .scroll-hint span {
      display: block;
      width: 1px;
      height: 20px;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.2), rgba(255,255,255,0));
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes hintAppear {
      0%, 60% { opacity: 0; }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes scrollPulse {
      0%, 100% { transform: translateY(-4px); opacity: 0.3; }
      50% { transform: translateY(4px); opacity: 0.7; }
    }

    .scroll-container::-webkit-scrollbar { display: none; }
    .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div class="video-bg">
    <video id="vid" muted playsinline preload="auto">
      <source src="sunrise.mp4" type="video/mp4">
    </video>
  </div>

  <div class="content">
    <div class="wordmark">Sunrise Labs</div>
  </div>

  <div class="mail-icon">
    <a href="mailto:hello@sunriselabs.com" aria-label="Email us">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="2,4 12,13 22,4"/>
      </svg>
    </a>
  </div>

  <div class="scroll-hint"><span></span></div>

  <div class="scroll-container" id="scroller">
    <div class="scroll-spacer"></div>
  </div>

  <script>
    const video = document.getElementById('vid');
    const scroller = document.getElementById('scroller');

    let targetTime = 0;
    let seeking = false;

    // Show first frame on load
    video.addEventListener('loadedmetadata', () => {
      video.currentTime = 0;
    });

    // Force first frame display
    video.addEventListener('canplay', () => {
      video.play().then(() => {
        video.pause();
        video.currentTime = 0;
      }).catch(() => {});
    }, { once: true });

    // Gate seeks: only issue the next seek once the browser finishes the current one.
    // This prevents piling up decode operations that cause stutter.
    video.addEventListener('seeked', () => {
      seeking = false;
      // If the target moved while we were seeking, seek again to the latest target
      if (Math.abs(video.currentTime - targetTime) > 0.02) {
        seeking = true;
        video.currentTime = targetTime;
      }
    });

    // Scroll handler just updates targetTime and kicks one seek
    scroller.addEventListener('scroll', () => {
      const duration = video.duration;
      if (!duration || isNaN(duration)) return;

      const scrollTop = scroller.scrollTop;
      const maxScroll = scroller.scrollHeight - scroller.clientHeight;
      const progress = Math.min(Math.max(scrollTop / maxScroll, 0), 1);
      targetTime = progress * duration;

      if (!seeking) {
        seeking = true;
        video.currentTime = targetTime;
      }
    }, { passive: true });
  </script>
</body>
</html>
